server.port=8080
spring.application.name=api-gateway

# Eureka Config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# 1. Route to Auth-Service (Open Access)
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

# 2. Route to Post-Service (Secured)
spring.cloud.gateway.routes[1].id=post-service
spring.cloud.gateway.routes[1].uri=lb://POST-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/posts/**
spring.cloud.gateway.routes[1].filters[0]=AuthenticationFilter

# 3. Route to Comment-Service (Secured)
spring.cloud.gateway.routes[2].id=comment-service
spring.cloud.gateway.routes[2].uri=lb://COMMENT-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/comments/**
spring.cloud.gateway.routes[2].filters[0]=AuthenticationFilter

# 4. Route to Category-Service
spring.cloud.gateway.routes[3].id=category-service
spring.cloud.gateway.routes[3].uri=lb://CATEGORY-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/categories/**, /tags/**
spring.cloud.gateway.routes[3].filters[0]=AuthenticationFilter

# 5. Route to Media-Service (NEW - Secured for Uploads)
spring.cloud.gateway.routes[4].id=media-service
spring.cloud.gateway.routes[4].uri=lb://MEDIA-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/media/**
spring.cloud.gateway.routes[4].filters[0]=AuthenticationFilter

# 6. Route to Newsletter-Service (NEW - Keep it Open for subscribers)
spring.cloud.gateway.routes[5].id=newsletter-service
spring.cloud.gateway.routes[5].uri=lb://NEWSLETTER-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/newsletter/**
# Note: Isme AuthenticationFilter nahi dala taaki koi bhi guest subscribe kar sake