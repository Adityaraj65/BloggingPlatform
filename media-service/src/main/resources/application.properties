server.port=8087
spring.application.name=media-service

# Database Config (Make sure to create this DB in MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/inkwell_media
spring.datasource.username=root
spring.datasource.password=Whatiscar123@

# Local Upload Directory
file.upload-dir=./uploads

# Max file size configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# To access images via http://localhost:8083/uploads/filename.jpg
spring.mvc.static-path-pattern=/uploads/**
spring.web.resources.static-locations=file:${file.upload-dir}/